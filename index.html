<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S.A.Z. — Karaoke Restaurant</title>
<style>
:root{
  --gold:#D4AF37;
  --gold-light:#F2D27A;
  --panel:rgba(8,8,8,.88);
  --ios-spring:cubic-bezier(.2,.85,.25,1.12);
  --ios-soft:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  margin:0;
  min-height:100vh;
  overflow:hidden;
  font-family:Georgia,"Times New Roman",serif;
  background:linear-gradient(rgba(0,0,0,.62),rgba(0,0,0,.76)),url("background.png") center/cover no-repeat fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:linear-gradient(120deg, transparent 20%, rgba(212,175,55,.06) 45%, transparent 70%);
  animation:shimmer 8s linear infinite;
  pointer-events:none;
}
body::after{
  content:"";
  position:fixed;
  inset:0;
  background:radial-gradient(circle at 50% 35%, rgba(212,175,55,.08), transparent 35%);
  animation:pulseGlow 5s ease-in-out infinite;
  pointer-events:none;
}
.container{
  position:relative;
  z-index:1;
  text-align:center;
  padding:40px 24px;
  width:100%;
  max-width:420px;
}
h1{
  font-size:60px;
  letter-spacing:.2em;
  margin:0;
  color:var(--gold-light);
  animation:fadeRise 1.2s ease-out both;
}
.subtitle{
  margin-top:10px;
  font-size:12px;
  letter-spacing:.4em;
  color:var(--gold);
  animation:fadeRise 1.2s ease-out .15s both;
}
.divider{
  width:60px;
  height:1px;
  background:var(--gold);
  margin:24px auto;
  opacity:.5;
  animation:fadeRise 1.2s ease-out .3s both;
}
.buttons{display:flex;flex-direction:column;gap:16px}
.btn,
.modal-btn,
.network-btn{
  text-decoration:none;
  padding:18px;
  border:1px solid rgba(212,175,55,.7);
  border-radius:18px;
  color:var(--gold-light);
  font-size:18px;
  letter-spacing:.08em;
  transition:transform .22s var(--ios-soft), box-shadow .22s ease, background .22s ease, border-color .22s ease, opacity .22s ease;
  background:rgba(0,0,0,.42);
  backdrop-filter:blur(10px) saturate(140%);
  -webkit-backdrop-filter:blur(10px) saturate(140%);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 12px 28px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.04);
  will-change:transform;
}
.buttons .btn:nth-child(1){animation:fadeRise 1.2s ease-out .45s both;}
.buttons .btn:nth-child(2){animation:fadeRise 1.2s ease-out .6s both;}
.buttons .btn:nth-child(3){animation:fadeRise 1.2s ease-out .75s both;}
.btn:hover,.modal-btn:hover,.network-btn:hover{
  background:rgba(212,175,55,.12);
  border-color:var(--gold-light);
  transform:translateY(-2px) scale(1.01);
}
.btn:active,.modal-btn:active,.network-btn:active,
.btn.pressed,.modal-btn.pressed,.network-btn.pressed{
  transform:scale(.965);
  box-shadow:0 6px 18px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.05);
}
.btn.wifi-btn{
  position:relative;
  overflow:hidden;
}
.btn.wifi-btn::after{
  content:"";
  position:absolute;
  inset:-40% auto -40% -20%;
  width:40%;
  transform:rotate(18deg);
  background:linear-gradient(to right, transparent, rgba(255,255,255,.14), transparent);
  animation:wifiSweep 3.4s linear infinite;
}
.wifi-icon{
  width:20px;
  height:20px;
  display:inline-block;
  flex:0 0 20px;
}
.footer{
  margin-top:30px;
  font-size:11px;
  letter-spacing:.2em;
  color:rgba(255,255,255,.6);
  animation:fadeRise 1.2s ease-out .9s both;
}
.overlay{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg, rgba(0,0,0,.04), rgba(0,0,0,.58) 42%, rgba(0,0,0,.82) 100%);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:10;
  padding:18px 14px calc(18px + env(safe-area-inset-bottom));
  backdrop-filter:blur(10px) saturate(118%);
  -webkit-backdrop-filter:blur(10px) saturate(118%);
  opacity:0;
  transition:opacity .28s ease;
}
.overlay.active{display:flex;opacity:1}
.modal{
  width:min(100%, 460px);
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.022)), var(--panel);
  border:1px solid rgba(255,255,255,.12);
  border-radius:32px 32px 26px 26px;
  padding:20px 18px 18px;
  text-align:center;
  box-shadow:0 26px 80px rgba(0,0,0,.56), inset 0 1px 0 rgba(255,255,255,.05);
  position:relative;
  overflow:hidden;
  transform:translateY(110%) scale(.985);
  opacity:1;
}
.overlay.active .modal{animation:iosSheetIn .52s var(--ios-spring) forwards}
.sheet-handle{
  width:42px;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,.18);
  margin:2px auto 12px;
  position:relative;
  z-index:2;
}
.modal::before{
  content:"";
  position:absolute;
  inset:0 0 auto 0;
  height:110px;
  background:
    radial-gradient(circle at top, rgba(212,175,55,.15), transparent 68%),
    linear-gradient(180deg, rgba(255,255,255,.03), transparent);
  pointer-events:none;
}
.close-x{
  position:absolute;
  top:10px;
  right:12px;
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  color:rgba(255,255,255,.82);
  text-decoration:none;
  font-size:21px;
  line-height:1;
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,255,255,.09);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  z-index:3;
}
.network-list{
  display:grid;
  gap:12px;
  margin:30px 0 0;
  position:relative;
  z-index:1;
}
.network-btn{
  position:relative;
  justify-content:space-between;
  align-items:center;
  text-align:left;
  padding:18px 20px;
  border-radius:24px;
  background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.1);
  overflow:hidden;
}
.network-btn::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg, transparent 20%, rgba(255,255,255,.08) 50%, transparent 80%);
  transform:translateX(-120%);
  transition:transform .7s ease;
  pointer-events:none;
}
.network-btn:hover::after,.network-btn.active::after{transform:translateX(120%)}
.network-btn-left{
  display:flex;
  align-items:center;
  gap:14px;
}
.network-signal{
  width:48px;
  height:48px;
  border-radius:16px;
  display:flex;
  align-items:flex-end;
  justify-content:center;
  gap:4px;
  padding:10px 9px;
  background:rgba(212,175,55,.08);
  border:1px solid rgba(212,175,55,.18);
  flex:0 0 48px;
}
.signal-bar{
  width:5px;
  border-radius:999px;
  background:rgba(242,210,122,.24);
  box-shadow:0 0 0 1px rgba(255,255,255,.02);
}
.signal-bar.level-1{height:9px}
.signal-bar.level-2{height:15px}
.signal-bar.level-3{height:21px}
.network-btn[data-strength="1"] .signal-bar.level-1,
.network-btn[data-strength="2"] .signal-bar.level-1,
.network-btn[data-strength="2"] .signal-bar.level-2,
.network-btn[data-strength="3"] .signal-bar{
  background:linear-gradient(180deg, rgba(242,210,122,.98), rgba(212,175,55,.86));
  box-shadow:0 0 10px rgba(212,175,55,.18);
}
.network-meta strong{
  display:block;
  font-size:17px;
  color:#fff;
  letter-spacing:.03em;
}
.network-status{
  width:18px;
  height:18px;
  border-top:2px solid rgba(242,210,122,.9);
  border-right:2px solid rgba(242,210,122,.9);
  transform:rotate(45deg);
  opacity:.7;
  margin-right:6px;
}
.network-btn.active{
  background:linear-gradient(180deg, rgba(212,175,55,.16), rgba(212,175,55,.08));
  border-color:rgba(242,210,122,.58);
  box-shadow:0 0 0 1px rgba(242,210,122,.22), 0 18px 30px rgba(0,0,0,.18);
  transform:translateY(-1px) scale(1.01);
}
.network-btn.active .network-status{
  color:var(--gold-light);
  border-color:rgba(242,210,122,.32);
  background:rgba(255,255,255,.04);
}
.modal-actions{
  display:none;
}
.modal-btn{
  width:100%;
  font-size:17px;
  background:linear-gradient(180deg, rgba(212,175,55,.18), rgba(212,175,55,.08));
  min-height:58px;
}
@keyframes shimmer{0%{transform:translateX(-30%)}100%{transform:translateX(30%)}}
@keyframes pulseGlow{0%,100%{opacity:.35}50%{opacity:.7}}
@keyframes fadeRise{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes wifiSweep{0%{left:-35%}100%{left:110%}}
@keyframes iosModalIn{
  0%{opacity:0;transform:translateY(22px) scale(.94)}
  60%{opacity:1;transform:translateY(-4px) scale(1.015)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes iosSheetIn{
  0%{transform:translateY(110%) scale(.985)}
  62%{transform:translateY(-8px) scale(1.01)}
  100%{transform:translateY(0) scale(1)}
}
@keyframes iosPop{
  0%{transform:scale(.96)}
  55%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
@media (max-width:420px){
  h1{font-size:52px}
  .btn,.modal-btn{font-size:17px}
  .modal{padding:18px 14px 14px;border-radius:28px 28px 22px 22px}
  .network-btn{padding:16px 14px}
  .network-status{width:15px;height:15px;margin-right:2px}
}
</style>
</head>
<body>
<div class="container">
  <h1>S.A.Z.</h1>
  <div class="subtitle">KARAOKE RESTAURANT</div>
  <div class="divider"></div>
  <div class="buttons">
    <a class="btn" href="menu.html">МЕНЮ</a>
    <a class="btn" href="wine.html">ВИННАЯ КАРТА</a>
    <button class="btn wifi-btn" type="button" onclick="openWifiModal()" aria-label="Открыть Wi-Fi">
      <svg class="wifi-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
        <path d="M2 8.8C8.2 4.2 15.8 4.2 22 8.8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M5.5 12.5C9.2 9.8 14.8 9.8 18.5 12.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 16.2C10.8 14.9 13.2 14.9 15 16.2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <circle cx="12" cy="19" r="1.4" fill="currentColor"/>
      </svg>
      WI-FI
    </button>
  </div>
  <div class="footer">S.A.Z. LOUNGE</div>
</div>

<div class="overlay" id="wifiOverlay" onclick="closeWifiModal(event)">
  <div class="modal" role="dialog" aria-modal="true" aria-label="Wi-Fi сети">
    <div class="sheet-handle" aria-hidden="true"></div>
    <a class="close-x" href="#" aria-label="Закрыть" onclick="closeWifiModal(event)">×</a>

    <div class="network-list" id="networkList"></div>
</div>
</div>

<script>
  const WIFI_NETWORKS = [
    {
      id: 'wifi1',
      label: 'Guest S.A.Z',
      ssid: 'S.A.Z.2',
      password: '20242024',
      encryption: 'WPA',
      hidden: false,
      strength: 3
    },
    {
      id: 'wifi2',
      label: 'Gali-Akhmet-2',
      ssid: 'Gali-Akhmet-2',
      password: '88888888',
      encryption: 'WPA',
      hidden: false,
      strength: 2
    }
  ];

  let activeNetworkIndex = 0;

  function escapeWifiValue(value) {
    return String(value).replace(/([\\;,:\"])/g, '\\$1');
  }

  function buildWifiPayload(network) {
    return `WIFI:T:${network.encryption};S:${escapeWifiValue(network.ssid)};P:${escapeWifiValue(network.password)};H:${network.hidden};;`;
  }

  function animatePress(el) {
    if (!el) return;
    el.classList.add('pressed');
    window.setTimeout(() => el.classList.remove('pressed'), 160);
  }

  function renderNetworkList() {
    const list = document.getElementById('networkList');
    list.innerHTML = '';

    WIFI_NETWORKS.forEach((network, index) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'network-btn' + (index === activeNetworkIndex ? ' active' : '');
      btn.dataset.strength = String(network.strength || 3);
      btn.innerHTML = `
        <div class="network-btn-left">
          <div class="network-signal" aria-hidden="true">
            <span class="signal-bar level-1"></span>
            <span class="signal-bar level-2"></span>
            <span class="signal-bar level-3"></span>
          </div>
          <div class="network-meta">
            <strong>${network.label}</strong>
          </div>
        </div>
        <div class="network-status" aria-hidden="true"></div>
      `;
      btn.addEventListener('click', () => {
        animatePress(btn);
        selectNetwork(index, false);
        window.setTimeout(() => connectDirect(index), 110);
      });
      list.appendChild(btn);
    });
  }

  function renderWifiInfo() {
    const network = WIFI_NETWORKS[activeNetworkIndex];
    return buildWifiPayload(network);
  }

  function selectNetwork(index, shouldAutoConnect) {
    activeNetworkIndex = index;
    renderNetworkList();
    if (shouldAutoConnect) {
      tryAutoConnect();
    }
  }

  function connectDirect(index) {
    const network = WIFI_NETWORKS[index];
    const payload = buildWifiPayload(network);
    try {
      window.location.href = payload;
    } catch (e) {
    }
  }

  function openWifiModal() {
    const overlay = document.getElementById('wifiOverlay');
    overlay.classList.add('active');
    renderNetworkList();
    const modal = overlay.querySelector('.modal');
    if (modal) {
      modal.style.animation = 'none';
      void modal.offsetWidth;
      modal.style.animation = 'iosModalIn .42s var(--ios-spring) forwards';
    }
  }

  function closeWifiModal(event) {
    if (event) event.preventDefault();
    if (!event || event.target.id === 'wifiOverlay' || event.target.classList.contains('close-x')) {
      document.getElementById('wifiOverlay').classList.remove('active');
    }
  }

  function tryAutoConnect() {
    const ua = navigator.userAgent || '';
    const isMobile = /Android|iPhone|iPad|iPod/i.test(ua);
    if (!isMobile) return;
    connectDirect(activeNetworkIndex);
  }
  document.querySelectorAll('.btn').forEach((el) => {
    el.addEventListener('click', () => animatePress(el));
  });

  document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
      document.getElementById('wifiOverlay').classList.remove('active');
    }
  });
</script>
</body>
</html>
