<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>S.A.Z. — Item</title>
<style>
:root {
  --bg:#080808;
  --gold:#d4af37;
  --gold-soft:#f0de9a;
  --text:#f7f1df;
  --muted:#c8bb88;
  --line:rgba(212,175,55,.22);
}
* { box-sizing:border-box; }
body {
  margin:0;
  min-height:100vh;
  color:var(--text);
  font-family:Georgia,"Times New Roman",serif;
  background:
    radial-gradient(circle at top right, rgba(212,175,55,.08), transparent 24%),
    radial-gradient(circle at bottom left, rgba(212,175,55,.06), transparent 18%),
    linear-gradient(180deg, #060606, #0c0c0c 45%, #080808);
}
.wrap {
  width:min(100%, 760px);
  margin:0 auto;
  padding:12px 10px 30px;
}
.topbar {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:10px 0 14px;
}
.back {
  color:var(--gold-soft);
  text-decoration:none;
  border:1px solid var(--line);
  border-radius:999px;
  padding:10px 14px;
  font-size:14px;
  background:rgba(255,255,255,.02);
}
.brand {
  margin:0;
  color:var(--gold-soft);
  font-size:24px;
  letter-spacing:.18em;
}
.photo {
  width:100%;
  min-height:420px;
  border:1px solid var(--line);
  border-radius:16px;
  overflow:hidden;
  background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
  display:grid;
  place-items:center;
  box-shadow:0 10px 30px rgba(0,0,0,.28);
}
.photo img {
  width:100%;
  height:100%;
  max-height:70vh;
  object-fit:cover;
  display:block;
}
.placeholder {
  padding:40px 22px;
  text-align:center;
  color:var(--muted);
  line-height:1.45;
}
.content {
  padding:18px 2px 0;
}
h1 {
  margin:0;
  color:var(--gold-soft);
  font-size:28px;
  line-height:1.2;
}
.price {
  display:inline-block;
  margin-top:12px;
  color:#080808;
  background:var(--gold-soft);
  border-radius:999px;
  padding:9px 14px;
  font-size:16px;
}
.hint {
  margin-top:14px;
  color:var(--muted);
  font-size:13px;
  line-height:1.4;
}
@media (max-width:480px) {
  .wrap { padding:10px 8px 24px; }
  .photo { min-height:320px; }
  h1 { font-size:24px; }
  .brand { font-size:20px; }
  .back { font-size:13px; padding:9px 12px; }
}
</style>
</head>
<body>
<main class="wrap">
  <div class="topbar">
    <a class="back" id="backLink" href="menu.html">Back</a>
    <div class="brand">S.A.Z.</div>
  </div>

  <section class="photo" aria-label="Item photo">
    <img id="itemImage" alt="" />
    <div class="placeholder" id="placeholder">
      Add this picture as <strong id="imageName"></strong> inside <strong>images/menu</strong>.
    </div>
  </section>

  <section class="content">
    <h1 id="itemName">Menu item</h1>
    <div class="price" id="itemPrice"></div>
    <div class="hint" id="hint"></div>
  </section>
</main>

<script>
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || 'menu-item';
  const name = params.get('name') || 'Menu item';
  const price = params.get('price') || '';
  const back = params.get('back') || 'menu.html';
  const image = document.getElementById('itemImage');
  const placeholder = document.getElementById('placeholder');
  const imageName = document.getElementById('imageName');
  const hint = document.getElementById('hint');
  const jpgPath = `images/menu/${id}.jpg`;
  const pngPath = `images/menu/${id}.png`;

  document.title = `S.A.Z. — ${name}`;
  document.getElementById('itemName').textContent = name;
  document.getElementById('itemPrice').textContent = price;
  document.getElementById('backLink').href = back;
  image.alt = name;
  imageName.textContent = `${id}.jpg`;
  hint.textContent = `Image file name: images/menu/${id}.jpg`;

  image.onerror = () => {
    if (image.dataset.fallback !== 'png') {
      image.dataset.fallback = 'png';
      image.src = pngPath;
      imageName.textContent = `${id}.png`;
      hint.textContent = `Image file name: images/menu/${id}.png`;
      return;
    }
    image.hidden = true;
    placeholder.hidden = false;
  };

  image.onload = () => {
    image.hidden = false;
    placeholder.hidden = true;
  };

  placeholder.hidden = true;
  image.src = jpgPath;
</script>
</body>
</html>
